<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MTG Draft</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #c9a84c; --gold-light: #e8c96a;
      --dark: #0d0d0f; --dark-2: #141418; --dark-3: #1c1c22; --dark-4: #22222a;
      --border: rgba(201,168,76,0.25); --text: #e8dfc8; --text-muted: #8a7f6a;
      --green: #6dbd7a; --red: #f08080;
    }
    body {
      background: var(--dark); color: var(--text);
      font-family: 'Crimson Pro', serif; min-height: 100vh;
      background-image: radial-gradient(ellipse at 15% 10%, rgba(201,168,76,0.03) 0%, transparent 50%);
    }

    /* HEADER */
    header {
      background: var(--dark-2); border-bottom: 1px solid var(--border);
      padding: 0.8rem 1.5rem; display: flex; align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 100;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .header-title {
      font-family: 'Cinzel', serif; font-size: 1rem; letter-spacing: 0.15em;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .header-info { display: flex; gap: 1.5rem; align-items: center; }
    .badge {
      font-family: 'Cinzel', serif; font-size: 0.68rem; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--text-muted);
    }
    .badge strong { color: var(--gold); font-weight: 700; }
    #player-badge { color: var(--text); font-size: 0.85rem; }

    /* MAIN LAYOUT */
    main { padding: 1.5rem; max-width: 1400px; margin: 0 auto; }

    /* STATUS BAR */
    #status-bar {
      background: var(--dark-2); border: 1px solid var(--border); border-radius: 2px;
      padding: 0.8rem 1.2rem; margin-bottom: 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
      font-size: 0.9rem;
    }
    #status-text { color: var(--text-muted); font-style: italic; }
    #status-text.active { color: var(--text); font-style: normal; }
    #pick-counter { font-family: 'Cinzel', serif; font-size: 0.75rem; letter-spacing: 0.1em; color: var(--gold); }

    /* CARD GRID */
    #hand-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .card-slot {
      cursor: pointer; border-radius: 8px; position: relative;
      transition: transform 0.15s, box-shadow 0.15s;
      aspect-ratio: 488/680; background: var(--dark-3);
      border: 2px solid transparent; overflow: hidden;
    }
    .card-slot:hover { transform: translateY(-4px) scale(1.02); }
    .card-slot.selected {
      border-color: var(--gold);
      box-shadow: 0 0 0 2px var(--gold), 0 8px 30px rgba(201,168,76,0.35);
      transform: translateY(-6px) scale(1.03);
    }
    .card-slot.disabled { cursor: not-allowed; opacity: 0.45; transform: none !important; }

    .card-img { width: 100%; height: 100%; object-fit: cover; display: block; border-radius: 6px; }
    .card-loading {
      width: 100%; height: 100%; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 0.5rem;
      background: var(--dark-3); border-radius: 6px;
    }
    .card-loading .spinner {
      width: 24px; height: 24px; border: 2px solid var(--border);
      border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    .card-loading .card-name-text {
      font-size: 0.72rem; text-align: center; padding: 0 0.5rem;
      color: var(--text-muted); line-height: 1.3;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .card-fallback {
      width: 100%; height: 100%; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 0.8rem;
      background: linear-gradient(160deg, var(--dark-3), var(--dark-4));
      border-radius: 6px; text-align: center;
    }
    .card-fallback .card-name-big { font-family: 'Cinzel', serif; font-size: 0.8rem; color: var(--text); line-height: 1.3; }

    .selected-badge {
      position: absolute; top: 6px; right: 6px;
      background: var(--gold); color: var(--dark);
      font-family: 'Cinzel', serif; font-size: 0.6rem; font-weight: 700;
      padding: 2px 6px; border-radius: 2px; letter-spacing: 0.1em;
    }

    /* CONFIRM BUTTON */
    #confirm-area { text-align: center; margin-bottom: 2rem; }
    #confirm-btn {
      background: transparent; border: 1px solid var(--gold); color: var(--gold);
      font-family: 'Cinzel', serif; font-size: 0.85rem; letter-spacing: 0.2em;
      text-transform: uppercase; padding: 0.9rem 3rem; cursor: pointer;
      border-radius: 2px; transition: all 0.2s; position: relative; overflow: hidden;
      opacity: 0.4; pointer-events: none;
    }
    #confirm-btn.ready { opacity: 1; pointer-events: all; }
    #confirm-btn::before { content: ''; position: absolute; inset: 0; background: var(--gold); transform: translateX(-100%); transition: transform 0.25s; }
    #confirm-btn.ready:hover::before { transform: translateX(0); }
    #confirm-btn.ready:hover { color: var(--dark); }
    #confirm-btn span { position: relative; z-index: 1; }

    /* WAITING OVERLAY */
    #waiting-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(13,13,15,0.9); backdrop-filter: blur(4px);
      z-index: 200; flex-direction: column; align-items: center; justify-content: center; gap: 1.5rem;
    }
    #waiting-overlay.show { display: flex; }
    .big-spinner {
      width: 60px; height: 60px; border: 3px solid var(--border);
      border-top-color: var(--gold); border-radius: 50%; animation: spin 1s linear infinite;
    }
    .waiting-text { font-family: 'Cinzel', serif; font-size: 1.1rem; letter-spacing: 0.1em; color: var(--gold); }
    .waiting-sub { color: var(--text-muted); font-size: 0.88rem; }

    /* DRAFTED SIDEBAR toggle */
    #drafted-toggle {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      background: var(--dark-2); border: 1px solid var(--border);
      color: var(--gold); font-family: 'Cinzel', serif; font-size: 0.7rem;
      letter-spacing: 0.1em; padding: 0.7rem 1rem; cursor: pointer;
      border-radius: 2px; z-index: 50; box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }
    #drafted-panel {
      display: none; position: fixed; bottom: 4.5rem; right: 1.5rem;
      background: var(--dark-2); border: 1px solid var(--border);
      border-radius: 2px; width: 260px; max-height: 420px; overflow-y: auto;
      z-index: 50; box-shadow: 0 8px 32px rgba(0,0,0,0.5); padding: 1rem;
    }
    #drafted-panel h3 { font-family: 'Cinzel', serif; font-size: 0.72rem; letter-spacing: 0.15em; color: var(--gold); margin-bottom: 0.8rem; }
    #drafted-list { font-size: 0.85rem; line-height: 1.8; color: var(--text-muted); }

    /* ROUND CHANGE FLASH */
    #round-flash {
      display: none; position: fixed; inset: 0;
      background: rgba(13,13,15,0.95); z-index: 300;
      flex-direction: column; align-items: center; justify-content: center; gap: 1rem;
    }
    #round-flash.show { display: flex; }
    #round-flash .rf-title { font-family: 'Cinzel', serif; font-size: 2.5rem; color: var(--gold); letter-spacing: 0.15em; }
    #round-flash .rf-sub { color: var(--text-muted); font-size: 1rem; }
  </style>
</head>
<body>
  <header>
    <div class="header-title">⚔ MTG Pick-2 Draft</div>
    <div class="header-info">
      <div class="badge">Round <strong id="hdr-round">1</strong> / 3</div>
      <div class="badge">Pack size: <strong id="hdr-pack">15</strong></div>
      <div class="badge" id="player-badge">—</div>
    </div>
  </header>

  <main>
    <div id="status-bar">
      <div id="status-text">Connecting…</div>
      <div id="pick-counter">0 / 2 selected</div>
    </div>

    <div id="hand-grid"></div>
    <div id="confirm-area">
      <button id="confirm-btn" onclick="confirmPicks()"><span>⚔ Confirm Picks (0/2)</span></button>
    </div>
  </main>

  <!-- Drafted sidebar -->
  <button id="drafted-toggle" onclick="toggleDrafted()">📋 My Pool (<span id="drafted-count">0</span>)</button>
  <div id="drafted-panel">
    <h3>My Drafted Cards</h3>
    <div id="drafted-list">None yet.</div>
  </div>

  <!-- Waiting overlay -->
  <div id="waiting-overlay">
    <div class="big-spinner"></div>
    <div class="waiting-text">Waiting for other players…</div>
    <div class="waiting-sub" id="waiting-sub"></div>
  </div>

  <!-- Round flash -->
  <div id="round-flash">
    <div class="rf-title" id="rf-title">ROUND 2</div>
    <div class="rf-sub">Packs are being passed — get ready!</div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.4/socket.io.min.js"></script>
  <script>
    const DRAFT_ID = "{{ draft_id }}";
    const socket = io();

    let currentHand = [];
    let selectedCards = [];
    let picksNeeded = 2;
    let scryfallCache = {};
    let draftedCards = [];

    // ---- Scryfall image fetch ----
    async function getCardImage(name) {
      if (scryfallCache[name]) return scryfallCache[name];
      try {
        const url = `https://api.scryfall.com/cards/named?exact=${encodeURIComponent(name)}&format=json`;
        const res = await fetch(url);
        if (!res.ok) throw new Error('not found');
        const data = await res.json();
        const img = data.image_uris?.normal || data.card_faces?.[0]?.image_uris?.normal || null;
        scryfallCache[name] = img;
        return img;
      } catch {
        scryfallCache[name] = null;
        return null;
      }
    }

    // ---- Render hand ----
    async function renderHand(hand) {
      const grid = document.getElementById('hand-grid');
      grid.innerHTML = '';
      selectedCards = [];
      updateConfirmBtn();

      for (const cardName of hand) {
        const slot = document.createElement('div');
        slot.className = 'card-slot';
        slot.dataset.card = cardName;

        // Loading state
        slot.innerHTML = `<div class="card-loading">
          <div class="spinner"></div>
          <div class="card-name-text">${cardName}</div>
        </div>`;

        slot.addEventListener('click', () => toggleSelect(cardName, slot));
        grid.appendChild(slot);

        // Async image load
        getCardImage(cardName).then(imgUrl => {
          if (imgUrl) {
            slot.innerHTML = `<img class="card-img" src="${imgUrl}" alt="${cardName}" loading="lazy"/>`;
          } else {
            slot.innerHTML = `<div class="card-fallback">
              <div class="card-name-big">${cardName}</div>
            </div>`;
          }
          // Re-apply selected state if needed
          if (selectedCards.includes(cardName)) {
            slot.classList.add('selected');
            const badge = document.createElement('div');
            badge.className = 'selected-badge';
            badge.textContent = '✓ PICK';
            slot.appendChild(badge);
          }
        });
      }
    }

    function toggleSelect(cardName, slot) {
      if (slot.classList.contains('disabled')) return;
      const idx = selectedCards.indexOf(cardName);
      if (idx !== -1) {
        selectedCards.splice(idx, 1);
        slot.classList.remove('selected');
        slot.querySelector('.selected-badge')?.remove();
      } else {
        if (selectedCards.length >= picksNeeded) return;
        selectedCards.push(cardName);
        slot.classList.add('selected');
        const badge = document.createElement('div');
        badge.className = 'selected-badge';
        badge.textContent = '✓ PICK';
        slot.appendChild(badge);
      }
      updateConfirmBtn();
      updateDisabled();
    }

    function updateDisabled() {
      document.querySelectorAll('.card-slot').forEach(slot => {
        if (selectedCards.length >= picksNeeded && !slot.classList.contains('selected')) {
          slot.classList.add('disabled');
        } else {
          slot.classList.remove('disabled');
        }
      });
    }

    function updateConfirmBtn() {
      const btn = document.getElementById('confirm-btn');
      const n = selectedCards.length;
      btn.querySelector('span').textContent = `⚔ Confirm Picks (${n}/${picksNeeded})`;
      document.getElementById('pick-counter').textContent = `${n} / ${picksNeeded} selected`;
      if (n === picksNeeded) { btn.classList.add('ready'); }
      else { btn.classList.remove('ready'); }
    }

    function confirmPicks() {
      if (selectedCards.length !== picksNeeded) return;
      socket.emit('submit_picks', { draft_id: DRAFT_ID, picks: selectedCards });
      // Disable grid while waiting
      document.querySelectorAll('.card-slot').forEach(s => s.classList.add('disabled'));
      document.getElementById('confirm-btn').classList.remove('ready');
    }

    function showWaiting(msg) {
      document.getElementById('waiting-overlay').classList.add('show');
      document.getElementById('waiting-sub').textContent = msg || '';
    }
    function hideWaiting() {
      document.getElementById('waiting-overlay').classList.remove('show');
    }

    function showRoundFlash(round) {
      const el = document.getElementById('round-flash');
      document.getElementById('rf-title').textContent = `ROUND ${round}`;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2200);
    }

    function updateDrafted(cards) {
      draftedCards = cards;
      document.getElementById('drafted-count').textContent = cards.length;
      if (cards.length === 0) {
        document.getElementById('drafted-list').textContent = 'None yet.';
        return;
      }
      const counts = {};
      cards.forEach(c => counts[c] = (counts[c]||0)+1);
      const lines = Object.entries(counts).sort((a,b)=>a[0].localeCompare(b[0]))
        .map(([n,q]) => `${q} x ${n}`);
      document.getElementById('drafted-list').innerHTML = lines.map(l => `<div>${l}</div>`).join('');
    }

    function toggleDrafted() {
      const panel = document.getElementById('drafted-panel');
      panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    }

    // ---- Socket events ----
    socket.on('connect', () => {
      socket.emit('join_draft', { draft_id: DRAFT_ID });
    });

    socket.on('hand_update', async data => {
      hideWaiting();
      document.getElementById('hdr-round').textContent = data.round;
      document.getElementById('hdr-pack').textContent = data.pack_size;
      document.getElementById('player-badge').textContent = data.player_name || `Player ${data.player_index+1}`;
      picksNeeded = data.picks_needed;
      updateDrafted(data.drafted);
      document.getElementById('status-text').textContent = `Pick ${picksNeeded} cards from the pack below`;
      document.getElementById('status-text').classList.add('active');
      await renderHand(data.hand);
    });

    socket.on('picks_accepted', data => {
      showWaiting('Your picks are in — waiting for others…');
    });

    socket.on('picks_progress', data => {
      document.getElementById('waiting-sub').textContent =
        `${data.total - data.remaining} / ${data.total} players have picked`;
    });

    socket.on('round_change', data => {
      showRoundFlash(data.round);
    });

    socket.on('draft_complete', () => {
      hideWaiting();
      setTimeout(() => {
        window.location.href = '/draft/' + DRAFT_ID + '/results';
      }, 800);
    });

    socket.on('error', data => {
      alert('Error: ' + data.msg);
      hideWaiting();
    });
  </script>
</body>
</html>
